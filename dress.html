<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ENNY CHINA - Collection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body {
            background: #ffffff;
            padding-bottom: 30px;
        }

        /* ----- 顶部导航栏：只有返回按钮（左） + 语言切换（右） ----- */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #f0f0f0;
        }
        .top-bar .back-link {
            font-size: 28px;
            color: #333;
            text-decoration: none;
            font-weight: 300;
            line-height: 1;
        }
        .top-bar .lang-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .top-bar .lang-group button {
            background: transparent;
            border: none;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            padding: 2px 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .top-bar .lang-group button.active-lang {
            background: #007aff;
            color: white;
        }
        .top-bar .lang-group button:active { transform: scale(0.9); }

        /* ----- 每个商品组 ----- */
        .product-group {
            margin: 20px 0;
            background: #ffffff;
        }

        /* 主图：全屏宽度 */
        .product-group .main-img {
            width: 100%;
            display: block;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f8f8f8;
            border-radius: 0; /* 如需圆角可加，但仿1688通常无圆角 */
        }

        /* NEW 标签：居中，大号，亮色 */
        .product-group .new-label {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #ff3b9f;
            padding: 12px 0 8px 0;
            background: #ffffff;
            text-shadow: 0 0 20px rgba(255, 59, 159, 0.15);
        }

        /* 细节图网格：两列，自动换行 */
        .product-group .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 0 4px;
        }
        .product-group .detail-grid img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f8f8f8;
            border-radius: 4px;
            display: block;
        }

        /* 商品组之间留白 */
        .product-group:not(:last-child) {
            margin-bottom: 30px;
        }

        /* 无商品时的提示 */
        .empty-hint {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <div class="top-bar">
        <a href="./index.html" class="back-link" target="_self">‹</a>
        <div class="lang-group" id="langGroup">
            <button data-lang="en" class="active-lang">EN</button>
            <button data-lang="zh-CN">简</button>
            <button data-lang="zh-TW">繁</button>
            <button data-lang="ru">RU</button>
            <button data-lang="fr">FR</button>
            <button data-lang="ar">AR</button>
        </div>
    </div>

    <!-- ===== 商品容器 ===== -->
    <div id="productContainer"></div>

    <script>
        // ================================================================
        // ⭐⭐⭐ 商品数据（在这里上架/修改）⭐⭐⭐
        // 每个商品：sort（数字越大越靠前），mainImg（主图），detailImgs（细节图数组，2~10张）
        // 图片路径格式：images/你的图片文件名.jpg（支持手机原图，无需改名）
        // ================================================================
        const products = [
            // ----- 示例商品（你可以删掉换成自己的） -----
            {
                sort: 6,
                mainImg: 'images/dress_01_main.jpg',
                detailImgs: [
                    'images/dress_01_detail_1.jpg',
                    'images/dress_01_detail_2.jpg',
                    'images/dress_01_detail_3.jpg',
                    'images/dress_01_detail_4.jpg'  // 可多可少
                ]
            },
            {
                sort: 5,
                mainImg: 'images/skirt_01_main.jpg',
                detailImgs: [
                    'images/skirt_01_detail_1.jpg',
                    'images/skirt_01_detail_2.jpg'
                ]
            },
            {
                sort: 4,
                mainImg: 'images/yoga_01_main.jpg',
                detailImgs: [
                    'images/yoga_01_detail_1.jpg'
                ]
            },
            {
                sort: 3,
                mainImg: 'images/tshirt_01_main.jpg',
                detailImgs: [
                    'images/tshirt_01_detail_1.jpg',
                    'images/tshirt_01_detail_2.jpg',
                    'images/tshirt_01_detail_3.jpg'
                ]
            },
            {
                sort: 2,
                mainImg: 'images/dress_02_main.jpg',
                detailImgs: [
                    'images/dress_02_detail_1.jpg',
                    'images/dress_02_detail_2.jpg'
                ]
            },
            {
                sort: 1,
                mainImg: 'images/print_01_main.jpg',
                detailImgs: [
                    'images/print_01_detail_1.jpg',
                    'images/print_01_detail_2.jpg',
                    'images/print_01_detail_3.jpg',
                    'images/print_01_detail_4.jpg',
                    'images/print_01_detail_5.jpg'
                ]
            },

            // ⬇️ 上新品时复制下面模板，贴到最上面，改 sort（填最大数字）和图片路径
            // {
            //     sort: 999,
            //     mainImg: 'images/新款主图.jpg',
            //     detailImgs: [
            //         'images/新款细节1.jpg',
            //         'images/新款细节2.jpg',
            //         // ... 最多10张
            //     ]
            // },
        ];
        // ================================================================

        // ----- 多语言静态文本（本页只需要返回按钮符号，无需翻译，但保留切换功能） -----
        // 实际上返回按钮是符号，NEW固定英文，所以语言切换不改变任何可见文字，但保留按钮以兼容之前需求
        // 以下仅用于演示，不做实际翻译，但保留切换逻辑

        let currentLang = localStorage.getItem('enny_lang') || 'en';

        // 高亮当前语言
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('enny_lang', lang);
            document.querySelectorAll('#langGroup button').forEach(btn => {
                btn.classList.toggle('active-lang', btn.dataset.lang === lang);
            });
        }

        // 绑定语言切换事件
        document.querySelectorAll('#langGroup button').forEach(btn => {
            btn.addEventListener('click', function() {
                setLanguage(this.dataset.lang);
            });
        });
        // 初始化高亮
        document.querySelectorAll('#langGroup button').forEach(btn => {
            btn.classList.toggle('active-lang', btn.dataset.lang === currentLang);
        });

        // ----- 渲染商品 -----
        function renderProducts() {
            const container = document.getElementById('productContainer');
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="empty-hint">暂无商品，请上传图片并在代码中添加数据。</div>';
                return;
            }

            // 按 sort 降序排列（新品置顶）
            const sorted = [...products].sort((a, b) => (b.sort || 0) - (a.sort || 0));

            let html = '';
            sorted.forEach((p, index) => {
                // 细节图至少有一张，若没有则使用主图
                let detailImgs = p.detailImgs && p.detailImgs.length ? p.detailImgs : [p.mainImg];
                // 最多只取前10张（用户可以控制）
                if (detailImgs.length > 10) detailImgs = detailImgs.slice(0, 10);

                const detailItems = detailImgs.map(src =>
                    `<img src="${src}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23ddd%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 font-size=%2220%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E📷%3C/text%3E%3C/svg%3E'" />`
                ).join('');

                html += `
                    <div class="product-group">
                        <img class="main-img" src="${p.mainImg}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23ddd%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 font-size=%2220%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E📷%3C/text%3E%3C/svg%3E'" />
                        <div class="new-label">NEW</div>
                        <div class="detail-grid">${detailItems}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        renderProducts();
    </script>
</body>
</html>
