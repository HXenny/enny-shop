<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ENNY CHINA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body {
            background: #1a2332;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            position: relative;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .brand {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ff3b9f;
            text-shadow: 0 0 20px rgba(255, 59, 159, 0.4);
            margin-bottom: 6px;
        }
        .sub {
            font-size: 16px;
            color: #8899bb;
            letter-spacing: 6px;
            margin-bottom: 50px;
            font-weight: 300;
        }
        .new-tag {
            display: inline-block;
            background: #ff3b9f;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            padding: 4px 20px;
            border-radius: 30px;
            letter-spacing: 2px;
            margin-bottom: 18px;
            box-shadow: 0 0 30px rgba(255, 59, 159, 0.3);
        }
        .enter-btn {
            display: inline-block;
            background: transparent;
            border: 2px solid #ff3b9f;
            color: #ff3b9f;
            font-size: 20px;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(255, 59, 159, 0.1);
        }
        .enter-btn:active {
            background: #ff3b9f;
            color: #1a2332;
            transform: scale(0.95);
        }
        @media (max-width: 480px) {
            .brand { font-size: 36px; }
            .enter-btn { font-size: 17px; padding: 14px 30px; }
        }

        .lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 6px;
            background: rgba(255,255,255,0.08);
            padding: 6px 10px;
            border-radius: 30px;
            backdrop-filter: blur(6px);
            z-index: 999;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .lang-switcher button {
            background: transparent;
            border: none;
            color: #8899bb;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .lang-switcher button.active-lang {
            background: #ff3b9f;
            color: #fff;
            box-shadow: 0 0 20px rgba(255,59,159,0.3);
        }
        .lang-switcher button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="lang-switcher" id="langSwitcher">
        <button data-lang="en" class="active-lang">EN</button>
        <button data-lang="zh-CN">简</button>
        <button data-lang="zh-TW">繁</button>
        <button data-lang="ru">RU</button>
        <button data-lang="fr">FR</button>
        <button data-lang="ar">AR</button>
    </div>

    <div class="container">
        <div class="brand">ENNY CHINA</div>
        <div class="sub" id="subText">WOMEN'S WHOLESALE</div>
        <div class="new-tag" id="newTag">✦ NEW ARRIVALS ✦</div>
        <!-- 跳转链接已改为 ./dress.html + target="_self" -->
        <a href="./dress.html" class="enter-btn" target="_self" id="enterBtn">Click to View All New Styles →</a>
    </div>

    <script>
        const translations = {
            'en': { sub: "WOMEN'S WHOLESALE", newTag: "✦ NEW ARRIVALS ✦", enterBtn: "Click to View All New Styles →" },
            'zh-CN': { sub: "女装批发", newTag: "✦ 新品到货 ✦", enterBtn: "点击查看全部新款 →" },
            'zh-TW': { sub: "女裝批發", newTag: "✦ 新品到貨 ✦", enterBtn: "點擊查看全部新款 →" },
            'ru': { sub: "ОПТОВАЯ ЖЕНСКАЯ ОДЕЖДА", newTag: "✦ НОВИНКИ ✦", enterBtn: "Смотреть все новинки →" },
            'fr': { sub: "GROSSISTE DE MODE FEMME", newTag: "✦ NOUVEAUTÉS ✦", enterBtn: "Voir tous les nouveaux styles →" },
            'ar': { sub: "الجملة النسائية", newTag: "✦ وصول جديدة ✦", enterBtn: "عرض جميع الطرازات الجديدة →" }
        };

        function getCurrentLang() { return localStorage.getItem('enny_lang') || 'en'; }

        function setLanguage(lang) {
            localStorage.setItem('enny_lang', lang);
            const t = translations[lang];
            if (t) {
                document.getElementById('subText').textContent = t.sub;
                document.getElementById('newTag').textContent = t.newTag;
                document.getElementById('enterBtn').textContent = t.enterBtn;
            }
            document.querySelectorAll('.lang-switcher button').forEach(btn => {
                btn.classList.toggle('active-lang', btn.dataset.lang === lang);
            });
        }

        document.querySelectorAll('.lang-switcher button').forEach(btn => {
            btn.addEventListener('click', function() { setLanguage(this.dataset.lang); });
        });

        const initialLang = getCurrentLang();
        setLanguage(initialLang);
    </script>
</body>
</html>
