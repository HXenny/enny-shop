<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ENNY CHINA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body {
            background: #1a2332;  /* 深灰蓝底 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .brand {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ff3b9f;        /* 亮粉色 */
            text-shadow: 0 0 20px rgba(255, 59, 159, 0.4);
            margin-bottom: 6px;
        }
        .sub {
            font-size: 16px;
            color: #8899bb;
            letter-spacing: 6px;
            margin-bottom: 50px;
            font-weight: 300;
        }
        .new-tag {
            display: inline-block;
            background: #ff3b9f;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            padding: 4px 20px;
            border-radius: 30px;
            letter-spacing: 2px;
            margin-bottom: 18px;
            box-shadow: 0 0 30px rgba(255, 59, 159, 0.3);
        }
        .enter-btn {
            display: inline-block;
            background: transparent;
            border: 2px solid #ff3b9f;
            color: #ff3b9f;
            font-size: 20px;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(255, 59, 159, 0.1);
        }
        .enter-btn:active {
            background: #ff3b9f;
            color: #1a2332;
            transform: scale(0.95);
        }
        /* 手机端小屏适配 */
        @media (max-width: 480px) {
            .brand { font-size: 36px; }
            .enter-btn { font-size: 17px; padding: 14px 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">ENNY CHINA</div>
        <div class="sub">WOMEN'S WHOLESALE</div>
        <div class="new-tag">✦ NEW 新款 ✦</div>
        <a href=" " class="enter-btn">点击进入查看全部新款 →</a >
    </div>
</body>
</html>
